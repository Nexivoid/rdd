<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RDD</title>
    <meta name="theme-color" content="#050913">
    <link rel="icon" type="image/png" href="./rdd.png">
    <link rel="stylesheet" href="./style.css?v=1">
    <script src="./redirect.js?v=3" defer></script>
  </head>
  <body>
    <noscript>JavaScript is required to redirect to RDD.</noscript>
    <main class="redirect-stage">
      <section class="redirect-panel" aria-label="RDD redirect status">
        <div class="brand-lockup">
          <div class="logo-field" aria-hidden="true">
            <img class="logo" src="./rdd.png" alt="">
          </div>
          <p class="eyebrow">Redirect sequence armed</p>
          <h1>RDD</h1>
          <div class="status-row" aria-live="polite">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="status">Initializing redirect...</span>
          </div>
          <div class="launch-line" aria-hidden="true"><span></span></div>
          <p class="subcopy">
            Finding the right client build and opening the download route.
            <a class="fallback" id="fallback" href="https://rdd.latte.to/" hidden>Open RDD manually</a>
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
